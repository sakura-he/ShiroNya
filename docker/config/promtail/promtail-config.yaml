server:
  http_listen_port: 9080

positions:
  filename: /positions/positions.yaml

clients:
  - url: https://loki:3100/loki/api/v1/push
    tls_config:
      ca_file: /etc/promtail/certs/ca.crt
      cert_file: /etc/promtail/certs/client.crt
      key_file: /etc/promtail/certs/client.key
      server_name: loki

scrape_configs:
  - job_name: cerbos-audit
    static_configs:
      - targets:
          - localhost
        labels:
          job: cerbos-audit
          __path__: /audit_logs/audit.log
    pipeline_stages:
      - json:
          expressions:
            call_id: callId
            timestamp: timestamp
            peer_address: peer.address
            user_agent: peer.userAgent
            method: method
            principal_id: checkResources.inputs[0].principal.id
            resource_kind: checkResources.inputs[0].resource.kind
            resource_id: checkResources.inputs[0].resource.id
            request_id: checkResources.inputs[0].requestId
      - regex:
          expression: '"log\\.kind":"(?P<kind>[^"]+)"'
      - labels:
          kind:
          call_id:
          peer_address:
          method:
          principal_id:
          resource_kind:
          resource_id:
      - timestamp:
          source: timestamp
          format: RFC3339Nano

  - job_name: shiro-nya-runtime-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: shiro-nya-runtime-logs
          __path__: /shiro-nya_logs/app-api/system-*.log
      - targets:
          - localhost
        labels:
          job: shiro-nya-runtime-logs
          __path__: /shiro-nya_logs/app-api/user_action-*.log
      - targets:
          - localhost
        labels:
          job: shiro-nya-runtime-logs
          __path__: /shiro-nya_logs/admin-api/system-*.log
      - targets:
          - localhost
        labels:
          job: shiro-nya-runtime-logs
          __path__: /shiro-nya_logs/admin-api/user_action-*.log
    pipeline_stages:
      - json:
          expressions:
            ts: ts
            app: labels.app
            env: labels.env
            log_type: labels.log_type
            level: labels.level
            module: labels.module
            user_id: labels.user_id
      - timestamp:
          source: ts
          format: RFC3339
      - labels:
          app:
          env:
          log_type:
          level:
          module:
