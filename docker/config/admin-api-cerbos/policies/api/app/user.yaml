# yaml-language-server: $schema=https://api.cerbos.dev/latest/cerbos/policy/v1/Policy.schema.json
# admin-api App 用户管理接口策略
# 数据库语义：system.app.user.index 仅分配给 super_admin，因此 admin_app_user 仅 super_admin 可访问
apiVersion: api.cerbos.dev/v1
resourcePolicy:
  resource: admin_app_user
  version: default
  rules:
    - actions: ["list", "roles", "detail", "create", "update", "delete", "update_status", "reset_password"]
      roles: ["super_admin"]
      effect: EFFECT_ALLOW