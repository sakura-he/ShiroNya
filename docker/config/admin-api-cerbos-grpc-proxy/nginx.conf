# Admin Cerbos gRPC 反向代理配置
# 使用 mTLS 双向认证，证书统一挂载自 certs/cerbos-admin/tls
events {}

http {
    # 上游 Cerbos gRPC 服务
    upstream admin_cerbos_grpc_backend {
        server admin-api-cerbos:3693;
    }

    server {
        # 监听 gRPC 端口，启用 SSL
        listen 3693 ssl;
        listen [::]:3693 ssl;
        http2 on;

        # admin 专用 TLS 证书
        ssl_certificate /certs/server.crt;
        ssl_certificate_key /certs/server.key;
        # CA 证书用于验证客户端证书（mTLS）
        ssl_client_certificate /certs/ca.crt;
        ssl_verify_client on;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_session_cache shared:ADMIN_CERBOS:10m;

        location / {
            # 转发 gRPC 请求到 Cerbos 服务
            grpc_pass grpc://admin_cerbos_grpc_backend;
            grpc_set_header Host $host;
            grpc_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            grpc_set_header X-Forwarded-Proto $scheme;
            grpc_read_timeout 3600s;
            grpc_send_timeout 3600s;
        }
    }
}
