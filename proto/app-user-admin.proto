  google.protobuf.StringValue name = 1;
  google.protobuf.StringValue email = 2;
  google.protobuf.StringValue phone_number = 3;
  google.protobuf.Int32Value status = 4;
  int32 page = 5;
  int32 page_size = 6;
  reserved 9;
  google.protobuf.StringValue id = 7;
  google.protobuf.StringValue nickname = 8;
  google.protobuf.Int32Value role_id = 10;
  google.protobuf.BoolValue email_verified = 11;
  google.protobuf.BoolValue phone_number_verified = 12;
  google.protobuf.StringValue created_at_start = 13;
  google.protobuf.StringValue created_at_end = 14;
  google.protobuf.StringValue updated_at_start = 15;
  google.protobuf.StringValue updated_at_end = 16;
}

message ListBusinessUsersResponse {
