syntax = "proto3";

package app_user_admin;

import "google/protobuf/empty.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/wrappers.proto";

service AppBusinessUserAdmin {
  rpc ListBusinessUsers(ListBusinessUsersRequest) returns (ListBusinessUsersResponse);
  rpc ListBusinessRoles(google.protobuf.Empty) returns (ListBusinessRolesResponse);
  rpc GetBusinessUser(GetBusinessUserRequest) returns (UserMessage);
  rpc GetBusinessUserRoleIds(GetBusinessUserRoleIdsRequest) returns (Int32ListValue);
  rpc CreateBusinessUser(CreateBusinessUserRequest) returns (UserMessage);
  rpc UpdateBusinessUser(UpdateBusinessUserRequest) returns (UserMessage);
  rpc UpdateBusinessUserStatus(UpdateBusinessUserStatusRequest) returns (google.protobuf.Empty);
  rpc SoftDeleteBusinessUser(SoftDeleteBusinessUserRequest) returns (google.protobuf.Empty);
  rpc DeleteBusinessUser(DeleteBusinessUserRequest) returns (google.protobuf.Empty);
  rpc ResetBusinessUserPassword(ResetBusinessUserPasswordRequest) returns (google.protobuf.Empty);
}

service AppBetterAuthAdmin {
  rpc ListAdminUsers(ListAdminUsersRequest) returns (ListAdminUsersResponse);
  rpc GetAdminUser(GetAdminUserRequest) returns (UserMessage);
  rpc CreateAdminUser(CreateAdminUserRequest) returns (UserMessage);
  rpc UpdateAdminUser(UpdateAdminUserRequest) returns (UserMessage);
  rpc BanAdminUser(BanAdminUserRequest) returns (UserMessage);
  rpc UnbanAdminUser(UnbanAdminUserRequest) returns (UserMessage);
  rpc ListAdminUserSessions(ListAdminUserSessionsRequest) returns (ListAdminUserSessionsResponse);
  rpc ImpersonateAdminUser(ImpersonateAdminUserRequest) returns (ImpersonationResponse);
  rpc StopImpersonatingAdminUser(StopImpersonatingAdminUserRequest) returns (ImpersonationResponse);
  rpc RevokeAdminUserSession(RevokeAdminUserSessionRequest) returns (SuccessResponse);
  rpc RevokeAdminUserSessions(RevokeAdminUserSessionsRequest) returns (SuccessResponse);
  rpc RemoveAdminUser(RemoveAdminUserRequest) returns (SuccessResponse);
  rpc SetAdminUserPassword(SetAdminUserPasswordRequest) returns (SuccessResponse);
  rpc CheckAdminUserPermission(CheckAdminUserPermissionRequest) returns (SuccessResponse);
}

service AppRoleMenuPolicyAdmin {
  rpc GetRoleMenuIds(GetRoleMenuIdsRequest) returns (Int32ListValue);
  rpc AssignRoleMenus(AssignRoleMenusRequest) returns (SuccessResponse);
  rpc RemoveRoleMenuPolicy(RemoveRoleMenuPolicyRequest) returns (SuccessResponse);
}

service AppRbacRoleAdmin {
  rpc ListRbacRoles(RbacRoleListRequest) returns (RbacRoleListResponse);
  rpc GetRbacRoleRelations(RbacIdRequest) returns (RbacRoleRelationsResponse);
  rpc QueryRbacRoleAssignableUsers(RbacRoleAssignableUsersRequest) returns (RbacUserRelationListResponse);
  rpc QueryRbacRoleAssignableUserGroups(RbacRoleAssignableUserGroupsRequest) returns (RbacUserGroupRelationListResponse);
  rpc QueryRbacRoleAssignableParentRoles(RbacRoleAssignableParentRolesRequest) returns (RbacRoleRelationListResponse);
  rpc QueryRbacRoleAssignablePermissions(RbacRoleAssignablePermissionsRequest) returns (RbacPermissionRelationListResponse);
  rpc QueryRbacRoleEffectiveUsers(RbacRoleEffectiveUsersRequest) returns (RbacUserRelationListResponse);
  rpc CreateRbacRole(RbacRoleMutationRequest) returns (RbacRoleMessage);
  rpc UpdateRbacRole(RbacRoleMutationRequest) returns (RbacRoleMessage);
  rpc DeleteRbacRole(RbacIdRequest) returns (SuccessResponse);
  rpc AssignRbacRoleUsers(RbacRoleUsersRequest) returns (SuccessResponse);
  rpc AssignRbacRoleUserGroups(RbacRoleUserGroupsRequest) returns (SuccessResponse);
  rpc AssignRbacRoleParentRoles(RbacRoleParentRolesRequest) returns (SuccessResponse);
  rpc AssignRbacRolePermissions(RbacRolePermissionsRequest) returns (SuccessResponse);
}

service AppRbacUserGroupAdmin {
  rpc ListRbacUserGroups(RbacUserGroupListRequest) returns (RbacUserGroupListResponse);
  rpc GetRbacUserGroupRelations(RbacIdRequest) returns (RbacUserGroupRelationsResponse);
  rpc QueryRbacUserGroupMembers(RbacUserGroupMembersRequest) returns (RbacUserRelationListResponse);
  rpc QueryRbacUserGroupRoles(RbacUserGroupRolesRequest) returns (RbacRoleRelationListResponse);
  rpc QueryRbacUserGroupMenus(RbacUserGroupMenusRequest) returns (RbacMenuListResponse);
  rpc CreateRbacUserGroup(RbacUserGroupMutationRequest) returns (RbacUserGroupMessage);
  rpc UpdateRbacUserGroup(RbacUserGroupMutationRequest) returns (RbacUserGroupMessage);
  rpc DeleteRbacUserGroup(RbacIdRequest) returns (SuccessResponse);
  rpc AssignRbacUserGroupMembers(RbacUserGroupMembersMutationRequest) returns (SuccessResponse);
  rpc AssignRbacUserGroupRoles(RbacUserGroupRolesMutationRequest) returns (SuccessResponse);
}

service AppRbacPermissionAdmin {
  rpc ListRbacPermissions(RbacPermissionListRequest) returns (RbacPermissionListResponse);
  rpc GetRbacPermissionDeclarationBoard(google.protobuf.Empty) returns (RbacPermissionDeclarationBoardResponse);
  rpc SuggestRbacPermissionCode(RbacPermissionCodeSuggestionRequest) returns (RbacPermissionCodeSuggestionResponse);
  rpc CreateRbacPermission(RbacPermissionMutationRequest) returns (RbacPermissionMessage);
  rpc UpdateRbacPermission(RbacPermissionMutationRequest) returns (RbacPermissionMessage);
  rpc DeleteRbacPermission(RbacIdRequest) returns (SuccessResponse);
  rpc GetRbacPermissionRelations(RbacIdRequest) returns (RbacPermissionRelationsResponse);
  rpc QueryRbacPermissionRoles(RbacPermissionRolesRequest) returns (RbacRoleRelationListResponse);
  rpc AssignRbacPermissionRoles(RbacPermissionRolesMutationRequest) returns (SuccessResponse);
}

service AppRbacPermissionGroupAdmin {
  rpc ListRbacPermissionGroups(RbacPermissionGroupListRequest) returns (RbacPermissionGroupListResponse);
  rpc CreateRbacPermissionGroup(RbacPermissionGroupMutationRequest) returns (RbacPermissionGroupMessage);
  rpc UpdateRbacPermissionGroup(RbacPermissionGroupMutationRequest) returns (RbacPermissionGroupMessage);
  rpc DeleteRbacPermissionGroup(RbacIdRequest) returns (SuccessResponse);
  rpc GetRbacPermissionGroupRelations(RbacIdRequest) returns (RbacPermissionGroupRelationsResponse);
  rpc AssignRbacPermissionGroupRelations(RbacPermissionGroupRelationsMutationRequest) returns (RbacPermissionGroupRelationsResponse);
}

service AppRbacMenuAdmin {
  rpc ListRbacMenuTree(RbacMenuTreeRequest) returns (RbacMenuListResponse);
  rpc ListRbacMenus(RbacMenuListRequest) returns (RbacMenuListResponse);
  rpc GetRbacMenuDetail(RbacIdRequest) returns (RbacMenuDetailResponse);
  rpc CreateRbacMenu(RbacMenuMutationRequest) returns (RbacMenuMessage);
  rpc UpdateRbacMenu(RbacMenuMutationRequest) returns (RbacMenuMessage);
  rpc DeleteRbacMenu(RbacIdRequest) returns (SuccessResponse);
}

service AppCerbosAbacAdmin {
  rpc GetAbacHealth(google.protobuf.Empty) returns (CerbosAbacJsonResponse);
  rpc GetAbacFields(google.protobuf.Empty) returns (CerbosAbacJsonResponse);
  rpc ListAbacFieldRegistry(CerbosAbacJsonRequest) returns (CerbosAbacJsonResponse);
  rpc UpsertAbacField(CerbosAbacJsonRequest) returns (CerbosAbacJsonResponse);
  rpc DeleteAbacField(CerbosAbacIdRequest) returns (CerbosAbacJsonResponse);
  rpc ListAbacRbacPermissionOptions(CerbosAbacJsonRequest) returns (CerbosAbacJsonResponse);
  rpc ListAbacPolicyGroups(google.protobuf.Empty) returns (CerbosAbacJsonResponse);
  rpc UpsertAbacPolicyGroup(CerbosAbacJsonRequest) returns (CerbosAbacJsonResponse);
  rpc DeleteAbacPolicyGroup(CerbosAbacIdRequest) returns (CerbosAbacJsonResponse);
  rpc ListAbacManualPolicies(google.protobuf.Empty) returns (CerbosAbacJsonResponse);
  rpc ValidateAbacManualPolicy(CerbosAbacJsonRequest) returns (CerbosAbacJsonResponse);
  rpc UpsertAbacManualPolicy(CerbosAbacJsonRequest) returns (CerbosAbacJsonResponse);
  rpc DeleteAbacManualPolicy(CerbosAbacIdRequest) returns (CerbosAbacJsonResponse);
  rpc PreviewAbacCompile(google.protobuf.Empty) returns (CerbosAbacJsonResponse);
  rpc PreviewAbacPublish(CerbosAbacJsonRequest) returns (CerbosAbacJsonResponse);
  rpc PublishAbac(CerbosAbacJsonRequest) returns (CerbosAbacJsonResponse);
  rpc GetAbacReleases(google.protobuf.Empty) returns (CerbosAbacJsonResponse);
  rpc RollbackAbacRelease(CerbosAbacRevisionRequest) returns (CerbosAbacJsonResponse);
  rpc TestAbacRuntime(CerbosAbacJsonRequest) returns (CerbosAbacJsonResponse);
}

message StringPatch {
  oneof kind {
    string value = 1;
    google.protobuf.NullValue null_value = 2;
  }
}

message StringListValue {
  repeated string values = 1;
}

message Int32ListValue {
  repeated int32 values = 1;
}

message Int64ListValue {
  repeated int64 values = 1;
}

message AdminFilterValue {
  oneof kind {
    string string_value = 1;
    int64 number_value = 2;
    bool bool_value = 3;
    StringListValue string_list = 4;
    Int64ListValue number_list = 5;
  }
}

message PermissionEntry {
  string resource = 1;
  repeated string actions = 2;
}

message BusinessRoleMessage {
  int32 id = 1;
  string name = 2;
  string code = 3;
  google.protobuf.StringValue description = 4;
  string status = 5;
}

message ListBusinessRolesResponse {
  repeated BusinessRoleMessage records = 1;
}

message UserProfileMessage {
  int32 id = 1;
  string user_id = 2;
  google.protobuf.StringValue nickname = 3;
  google.protobuf.StringValue avatar = 4;
  int32 gender = 5;
  int32 level = 6;
  int32 exp = 7;
  int32 status = 8;
  string created_at = 9;
  string updated_at = 10;
}

message UserMessage {
  string id = 1;
  string name = 2;
  string email = 3;
  bool email_verified = 4;
  google.protobuf.StringValue image = 5;
  google.protobuf.StringValue role = 6;
  bool banned = 7;
  google.protobuf.StringValue ban_reason = 8;
  google.protobuf.StringValue ban_expires = 9;
  string created_at = 10;
  string updated_at = 11;
  google.protobuf.StringValue phone_number = 12;
  google.protobuf.BoolValue phone_number_verified = 13;
  UserProfileMessage profile = 14;
  repeated int32 role_ids = 15;
}

message SessionMessage {
  string id = 1;
  string expires_at = 2;
  string token = 3;
  string created_at = 4;
  string updated_at = 5;
  google.protobuf.StringValue ip_address = 6;
  google.protobuf.StringValue user_agent = 7;
  string user_id = 8;
  google.protobuf.StringValue impersonated_by = 9;
}

message PaginationMessage {
  int32 total = 1;
  int32 total_pages = 2;
  int32 page = 3;
  int32 page_size = 4;
}

message SuccessResponse {
  bool success = 1;
}

message CerbosAbacJsonRequest {
  string json = 1;
}

message CerbosAbacJsonResponse {
  string json = 1;
}

message CerbosAbacIdRequest {
  string id = 1;
}

message CerbosAbacRevisionRequest {
  string revision = 1;
}

