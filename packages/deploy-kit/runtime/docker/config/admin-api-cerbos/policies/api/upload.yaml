# yaml-language-server: $schema=https://api.cerbos.dev/latest/cerbos/policy/v1/Policy.schema.json
# admin-api 上传接口策略
# 数据库菜单中无 admin_upload 对应页面，按保守策略仅 super_admin 可访问
apiVersion: api.cerbos.dev/v1
resourcePolicy:
  resource: admin_upload
  version: default
  rules:
    - actions: ["upload", "uploads", "upload_chunk", "merge_chunks", "get_chunk_by_file_uid", "test"]
      roles: ["super_admin"]
      effect: EFFECT_ALLOW
