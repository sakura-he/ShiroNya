# yaml-language-server: $schema=https://api.cerbos.dev/latest/cerbos/policy/v1/Policy.schema.json
# admin-api App Better Auth 管理接口策略
# 数据库菜单中无独立按钮权限，且相关 App 管理页面仅分配给 super_admin
apiVersion: api.cerbos.dev/v1
resourcePolicy:
  resource: admin_app_better_auth
  version: default
  rules:
    - actions:
        ["list_users", "get_user", "create_user", "update_user", "ban_user", "unban_user", "list_user_sessions", "impersonate_user", "stop_impersonating", "revoke_user_session", "revoke_user_sessions", "remove_user", "set_user_password", "has_permission"]
      roles: ["super_admin"]
      effect: EFFECT_ALLOW