apiVersion: 1

datasources:
  - name: Tempo
    uid: tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    isDefault: false
    editable: true
    version: 13
    jsonData:
      httpMethod: GET
      nodeGraph:
        enabled: true
      tracesToLogsV2:
        datasourceUid: 'loki'
        spanStartTimeShift: '-1m'
        spanEndTimeShift: '1m'
        filterByTraceID: true
        filterBySpanID: false
      serviceMap:
        datasourceUid: ''
