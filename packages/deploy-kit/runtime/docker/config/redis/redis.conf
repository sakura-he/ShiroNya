# Redis 配置文件
# 网络
bind 0.0.0.0
port 6379
protected-mode yes

# 认证 - ACL 用户
# 具体用户和密码由 docker compose 启动命令从 .env 注入，不要把明文密码写入仓库。
user default off

# 持久化 - AOF
appendonly yes
appendfsync everysec
appendfilename "appendonly.aof"

# 持久化 - RDB
save 900 1
save 300 10
save 60 10000
dbfilename dump.rdb

# 内存管理
maxmemory 256mb
maxmemory-policy noeviction

# 日志
loglevel notice

# 连接
timeout 0
tcp-keepalive 300
